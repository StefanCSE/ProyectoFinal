<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tienda API - Pruebas</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
    h2 { margin-top: 30px; color: #444; }
    input, button { padding: 8px; margin: 4px; font-size: 14px; }
    button { background: #333; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #555; }
    pre { background: #f4f4f4; padding: 15px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
    .seccion { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 6px; }
  </style>
</head>
<body>

  <h1>Tienda API - Pagina de Prueba</h1>

  <!-- CREAR PRODUCTO -->
  <div class="seccion">
    <h2>POST /products - Crear producto</h2>
    <input type="text" id="prod-name" placeholder="Nombre del producto" />
    <input type="number" id="prod-price" placeholder="Precio" />
    <input type="number" id="prod-stock" placeholder="Stock" />
    <button onclick="crearProducto()">Crear Producto</button>
    <pre id="res-crear-prod">---</pre>
  </div>

  <!-- VER PRODUCTOS -->
  <div class="seccion">
    <h2>GET /products - Ver todos los productos</h2>
    <button onclick="verProductos()">Ver Productos</button>
    <pre id="res-ver-prod">---</pre>
  </div>

  <!-- AGREGAR AL CARRITO -->
  <div class="seccion">
    <h2>POST /cart - Agregar al carrito</h2>
    <input type="number" id="cart-product-id" placeholder="ID del producto" />
    <input type="number" id="cart-quantity" placeholder="Cantidad" />
    <button onclick="agregarAlCarrito()">Agregar al Carrito</button>
    <pre id="res-agregar-cart">---</pre>
  </div>

  <!-- VER CARRITO -->
  <div class="seccion">
    <h2>GET /cart - Ver carrito</h2>
    <button onclick="verCarrito()">Ver Carrito</button>
    <pre id="res-ver-cart">---</pre>
  </div>

  <!-- CHECKOUT -->
  <div class="seccion">
    <h2>POST /checkout - Realizar pago</h2>
    <button onclick="hacerCheckout()">Pagar</button>
    <pre id="res-checkout">---</pre>
  </div>

  <script>
    const BASE = "http://localhost:3001";

    async function crearProducto() {
      const name = document.getElementById("prod-name").value;
      const price = document.getElementById("prod-price").value;
      const stock = document.getElementById("prod-stock").value;

      const res = await fetch(`${BASE}/products`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, price, stock })
      });
      const data = await res.json();
      document.getElementById("res-crear-prod").textContent = JSON.stringify(data, null, 2);
    }

    async function verProductos() {
      const res = await fetch(`${BASE}/products`);
      const data = await res.json();
      document.getElementById("res-ver-prod").textContent = JSON.stringify(data, null, 2);
    }

    async function agregarAlCarrito() {
      const productId = document.getElementById("cart-product-id").value;
      const quantity = document.getElementById("cart-quantity").value;

      const res = await fetch(`${BASE}/cart`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productId, quantity })
      });
      const data = await res.json();
      document.getElementById("res-agregar-cart").textContent = JSON.stringify(data, null, 2);
    }

    async function verCarrito() {
      const res = await fetch(`${BASE}/cart`);
      const data = await res.json();
      document.getElementById("res-ver-cart").textContent = JSON.stringify(data, null, 2);
    }

    async function hacerCheckout() {
      const res = await fetch(`${BASE}/checkout`, {
        method: "POST",
        headers: { "Content-Type": "application/json" }
      });
      const data = await res.json();
      document.getElementById("res-checkout").textContent = JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>
